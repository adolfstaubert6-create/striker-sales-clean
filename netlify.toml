[build]
  command = "npm install --prefix netlify/functions && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_APP_ID,VITE_FIREBASE_SENDER_ID"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["imapflow", "mailparser"]

[functions.ai-advisor]
  timeout = 26

[functions.agent]
  timeout = 26

[functions.gmail-check]
  timeout = 26

[functions.check-replies]
  timeout = 26

[functions.translate-reply]
  timeout = 26

[functions.energy-intel]
  timeout = 26

[functions.intel-hunt]
  timeout = 26

[functions.ai-analysis]
  timeout = 26

[functions.translate-draft]
  timeout = 26

[functions.signal-engine]
  timeout = 26

[functions.serpapi-reviews]
  timeout = 26

[functions.client-card]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
