[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_APP_ID,VITE_FIREBASE_SENDER_ID"

[functions]
  node_bundler = "nft"

[functions.ai-advisor]
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
